# Server 
server.port=8080

# DataSource (PostgreSQL) 
spring.datasource.url=jdbc:postgresql://localhost:5432/edulytix
spring.datasource.username=edulytix1
spring.datasource.password=pass@1234
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate 
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT 
# Replace with a long random secret (min 256-bit / 32 chars) in production
app.jwt.secret=edulytix-super-secret-key-change-in-production-32chars
app.jwt.expiration-ms=86400000

# AI Service ai.service.url=http://localhost:8000

# File Upload 
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=55MB

# Logging 
logging.level.com.edulytix=INFO
logging.level.org.springframework.security=WARN
